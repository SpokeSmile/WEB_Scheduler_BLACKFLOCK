{% load static %}
<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Black Flock Weekly Roster</title>
    <link rel="icon" type="image/png" href="{% static 'design_assets/Logo.png' %}">
    <link rel="stylesheet" href="{% static 'frontend/app.css' %}">
</head>
<body>
    <div id="root"></div>
    <script type="module" src="{% static 'frontend/app.js' %}"></script>
    <script>
        window.addEventListener('load', () => {
            const removeProfileEditButtons = () => {
                document.querySelectorAll('button').forEach((button) => {
                    if (button.textContent && button.textContent.trim() === 'Редактировать') {
                        const card = button.closest('article');
                        const section = button.closest('section');
                        if (card && section && section.textContent && section.textContent.includes('Player profiles')) {
                            button.remove();
                        }
                    }
                });
            };

            removeProfileEditButtons();
            new MutationObserver(removeProfileEditButtons).observe(document.getElementById('root'), {
                childList: true,
                subtree: true,
            });
        });
    </script>
</body>
</html>
